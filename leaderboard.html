<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What a drag! - Global Leaderboard</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #00e676; /* Neon Green */
            text-transform: uppercase;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(0, 230, 118, 0.5);
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1e1e1e;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        th {
            background-color: #2c2c2c;
            color: #03dac6; /* Teal */
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        tr:nth-child(even) {
            background-color: #252525;
        }
        tr:hover {
            background-color: #333;
        }
        .rank-1 { color: #ffd700; font-weight: bold; font-size: 1.2em; } /* Gold */
        .rank-2 { color: #c0c0c0; font-weight: bold; font-size: 1.1em; } /* Silver */
        .rank-3 { color: #cd7f32; font-weight: bold; font-size: 1.1em; } /* Bronze */
        
        .loading {
            padding: 20px;
            font-style: italic;
            color: #888;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>What a drag! <br><span style="font-size:0.6em; color:#fff;">Top 100 Global</span></h1>

    <div class="container">
        <table id="score-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Level</th>
                    <th>Time</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="score-body">
                <tr><td colspan="5" class="loading">Caricamento classifica...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="footer">
        <p>Classifica aggiornata in tempo reale.</p>
    </div>

    <script>
        // Cache busting per evitare che il browser mostri vecchi dati JSON
        const JSON_URL = 'leaderboard.json?v=' + new Date().getTime();

        async function loadLeaderboard() {
            try {
                const response = await fetch(JSON_URL);
                if (!response.ok) throw new Error("File not found");
                
                const data = await response.json();
                renderTable(data);
            } catch (error) {
                console.error("Errore caricamento:", error);
                document.getElementById('score-body').innerHTML = 
                    `<tr><td colspan="5" style="color: #cf6679;">Errore caricamento dati.<br>Riprova più tardi.</td></tr>`;
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('score-body');
            tbody.innerHTML = ''; // Pulisce il messaggio di loading

            // NESSUN LIMITE IMPOSTATO QUI: Renderizza tutto ciò che c'è nel JSON
            data.forEach((entry) => {
                const tr = document.createElement('tr');
                
                // Colori speciali per la Top 3
                let rankClass = '';
                if (entry.rank === 1) rankClass = 'rank-1';
                else if (entry.rank === 2) rankClass = 'rank-2';
                else if (entry.rank === 3) rankClass = 'rank-3';

                tr.innerHTML = `
                    <td class="${rankClass}">#${entry.rank}</td>
                    <td style="font-weight:bold; color: #fff;">${entry.name ? entry.name.substring(0, 15) : 'Unknown'}</td>
                    <td>${entry.level}</td>
                    <td>${entry.time}</td>
                    <td style="color:#aaa;">${parseInt(entry.score).toLocaleString()}</td>
                `;
                tbody.appendChild(tr);
            });
        }
        loadLeaderboard();
    </script>
</body>
</html>
